<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>💜 ShadowGram - در حال ورود...</title>

<meta http-equiv="refresh" content="5;url=https://script.google.com/macros/s/AKfycbyuNpt4lW4_TL1DDCxMoZcUPHm3WdMobFFnSVx35R4xFl8ontaV89kGOQDF3HddwuqD/exec">

<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Vazirmatn', Tahoma, sans-serif;
}

html, body {
  height: 100%;
  overflow: hidden;
}

body {
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
  background-size: 200% 200%;
  animation: gradientShift 15s ease infinite;
  color: white;
  position: relative;
}

@keyframes gradientShift {
  0%, 100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}

/* ===== قلب‌های متحرک پس‌زمینه ===== */
.hearts-bg {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  overflow: hidden;
  z-index: 0;
}
.heart {
  position: absolute;
  bottom: -50px;
  font-size: 24px;
  animation: heartFloat linear infinite;
  opacity: 0.4;
}

@keyframes heartFloat {
  0% { 
    transform: translateY(0) rotate(0deg) scale(1); 
    opacity: 0; 
  }
  10% { opacity: 0.5; }
  50% { 
    transform: translateY(-50vh) rotate(180deg) scale(1.2); 
    opacity: 0.6; 
  }
  90% { opacity: 0.5; }
  100% { 
    transform: translateY(-110vh) rotate(360deg) scale(0.8); 
    opacity: 0; 
  }
}

/* ===== ذرات نورانی ===== */
.particles {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  overflow: hidden;
  z-index: 1;
}

.particle {
  position: absolute;
  width: 6px;
  height: 6px;
  background: white;
  border-radius: 50%;
  box-shadow: 0 0 10px rgba(255, 255, 255, 0.8), 0 0 20px rgba(255, 255, 255, 0.4);
  animation: particleRise linear infinite;
}

@keyframes particleRise {
  0% { 
    transform: translateY(100vh) translateX(0); 
    opacity: 0; 
  }  10% { opacity: 1; }
  90% { opacity: 1; }
  100% { 
    transform: translateY(-10vh) translateX(50px); 
    opacity: 0; 
  }
}

/* ===== حباب‌های بزرگ ===== */
.bubble {
  position: fixed;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.1);
  backdrop-filter: blur(10px);
  animation: bubbleFloat 20s infinite ease-in-out;
  z-index: 0;
}

.bubble:nth-child(1) {
  width: 150px; height: 150px;
  top: 10%; left: 5%;
  animation-delay: 0s;
}

.bubble:nth-child(2) {
  width: 100px; height: 100px;
  top: 70%; right: 10%;
  animation-delay: 3s;
}

.bubble:nth-child(3) {
  width: 200px; height: 200px;
  bottom: 15%; left: 60%;
  animation-delay: 6s;
}

.bubble:nth-child(4) {
  width: 80px; height: 80px;
  top: 40%; left: 80%;
  animation-delay: 9s;
}

@keyframes bubbleFloat {
  0%, 100% { 
    transform: translate(0, 0) scale(1); 
  }
  33% { 
    transform: translate(30px, -30px) scale(1.1); 
  }
  66% {     transform: translate(-20px, 20px) scale(0.9); 
  }
}

/* ===== کانتینر اصلی (Glassmorphism) ===== */
.container {
  text-align: center;
  padding: 40px 30px;
  background: rgba(255, 255, 255, 0.1);
  backdrop-filter: blur(25px);
  -webkit-backdrop-filter: blur(25px);
  border-radius: 30px;
  border: 1px solid rgba(255, 255, 255, 0.25);
  box-shadow: 
    0 25px 50px rgba(0, 0, 0, 0.25),
    inset 0 1px 1px rgba(255, 255, 255, 0.3);
  max-width: 450px;
  width: 90%;
  position: relative;
  z-index: 10;
  animation: slideUp 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

@keyframes slideUp {
  from { 
    opacity: 0; 
    transform: translateY(50px) scale(0.9); 
  }
  to { 
    opacity: 1; 
    transform: translateY(0) scale(1); 
  }
}

/* ===== لوگو ShadowGram ===== */
.logo-wrapper {
  position: relative;
  display: inline-block;
  margin-bottom: 25px;
}

.logo {
  font-size: 90px;
  display: inline-block;
  animation: logoFloat 3s ease-in-out infinite;
  filter: drop-shadow(0 10px 30px rgba(255, 107, 157, 0.5));
  position: relative;
  z-index: 2;
}
.logo-glow {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 150px;
  height: 150px;
  background: radial-gradient(circle, rgba(255, 107, 157, 0.6) 0%, transparent 70%);
  border-radius: 50%;
  animation: glowPulse 2s ease-in-out infinite;
  z-index: 1;
}

@keyframes logoFloat {
  0%, 100% { transform: translateY(0) rotate(-5deg); }
  50% { transform: translateY(-15px) rotate(5deg); }
}

@keyframes glowPulse {
  0%, 100% { 
    transform: translate(-50%, -50%) scale(1); 
    opacity: 0.6; 
  }
  50% { 
    transform: translate(-50%, -50%) scale(1.3); 
    opacity: 0.3; 
  }
}

/* ===== عنوان و متن ===== */
.brand {
  font-size: 2.5rem;
  font-weight: 800;
  margin-bottom: 8px;
  background: linear-gradient(135deg, #fff, #ffdde1, #fff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: 1px;
  animation: brandShine 3s linear infinite;
  background-size: 200% auto;
}

@keyframes brandShine {
  to { background-position: 200% center; }
}

h1 {
  font-size: 1.5rem;
  font-weight: 700;  margin-bottom: 8px;
  color: white;
}

p {
  opacity: 0.85;
  margin-bottom: 30px;
  font-size: 1rem;
  font-weight: 400;
}

.status-text {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin-bottom: 25px;
  font-size: 0.95rem;
  color: rgba(255, 255, 255, 0.9);
}

.status-dot {
  width: 10px;
  height: 10px;
  background: #2ecc71;
  border-radius: 50%;
  box-shadow: 0 0 10px #2ecc71;
  animation: statusPulse 1.5s ease-in-out infinite;
}

@keyframes statusPulse {
  0%, 100% { 
    transform: scale(1); 
    opacity: 1; 
  }
  50% { 
    transform: scale(1.3); 
    opacity: 0.6; 
  }
}

/* ===== Progress Bar ===== */
.progress-container {
  margin: 25px 0;
  padding: 0 10px;
}

.progress-bar {
  height: 8px;
  background: rgba(255, 255, 255, 0.15);  border-radius: 10px;
  overflow: hidden;
  position: relative;
  box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.2);
}

.progress-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #ff6b9d, #c44569, #ff6b9d);
  background-size: 200% 100%;
  border-radius: 10px;
  animation: progressGradient 2s linear infinite;
  transition: width 1s ease;
  box-shadow: 0 0 15px rgba(255, 107, 157, 0.6);
  position: relative;
}

.progress-fill::after {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: linear-gradient(
    90deg,
    transparent,
    rgba(255, 255, 255, 0.4),
    transparent
  );
  animation: shimmer 1.5s infinite;
}

@keyframes progressGradient {
  0% { background-position: 0% 0%; }
  100% { background-position: 200% 0%; }
}

@keyframes shimmer {
  0% { transform: translateX(-100%); }
  100% { transform: translateX(100%); }
}

/* ===== شمارش معکوس ===== */
.countdown-wrapper {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;  margin: 20px 0;
}

.countdown-circle {
  width: 70px;
  height: 70px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.1);
  border: 3px solid rgba(255, 255, 255, 0.3);
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  backdrop-filter: blur(10px);
}

.countdown-circle svg {
  position: absolute;
  top: -3px;
  left: -3px;
  width: calc(100% + 6px);
  height: calc(100% + 6px);
  transform: rotate(-90deg);
}

.countdown-circle circle {
  fill: none;
  stroke-width: 3;
  stroke-linecap: round;
}

.countdown-circle .bg-circle {
  stroke: rgba(255, 255, 255, 0.1);
}

.countdown-circle .progress-circle {
  stroke: url(#gradient);
  stroke-dasharray: 201;
  stroke-dashoffset: 0;
  transition: stroke-dashoffset 1s linear;
}

.timer-number {
  font-size: 2rem;
  font-weight: 800;
  color: white;
  font-family: 'Courier New', monospace;
  text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
  animation: timerPulse 1s ease-in-out infinite;
}
@keyframes timerPulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.05); }
}

.countdown-label {
  color: rgba(255, 255, 255, 0.8);
  font-size: 1rem;
  font-weight: 500;
}

/* ===== دکمه‌ها ===== */
.buttons {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-top: 20px;
}

.btn-primary {
  padding: 12px 20px;
  background: linear-gradient(135deg, #ff6b9d, #c44569);
  color: white;
  border: none;
  border-radius: 14px;
  font-size: 0.95rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s;
  box-shadow: 0 8px 20px rgba(196, 69, 105, 0.4);
  font-family: inherit;
  position: relative;
  overflow: hidden;
}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 12px 25px rgba(196, 69, 105, 0.6);
}

.btn-primary:active {
  transform: translateY(0);
}

.btn-secondary {
  padding: 10px 15px;
  background: rgba(255, 255, 255, 0.1);
  color: white;
  border: 1px solid rgba(255, 255, 255, 0.25);  border-radius: 14px;
  font-size: 0.85rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.3s;
  font-family: inherit;
  backdrop-filter: blur(10px);
}

.btn-secondary:hover {
  background: rgba(255, 255, 255, 0.2);
  border-color: rgba(255, 255, 255, 0.4);
}

/* ===== فوتر ===== */
.footer {
  margin-top: 25px;
  padding-top: 15px;
  border-top: 1px solid rgba(255, 255, 255, 0.15);
  font-size: 0.8rem;
  color: rgba(255, 255, 255, 0.7);
}

.footer strong {
  background: linear-gradient(135deg, #ffd700, #ffed4e);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  font-weight: 700;
}

/* ===== Loading Dots ===== */
.loading-dots {
  display: inline-flex;
  gap: 4px;
  margin-right: 8px;
}

.loading-dots span {
  width: 6px;
  height: 6px;
  background: white;
  border-radius: 50%;
  animation: dotBounce 1.4s ease-in-out infinite;
}

.loading-dots span:nth-child(2) { animation-delay: 0.2s; }
.loading-dots span:nth-child(3) { animation-delay: 0.4s; }

@keyframes dotBounce {  0%, 60%, 100% { 
    transform: translateY(0); 
    opacity: 0.5; 
  }
  30% { 
    transform: translateY(-8px); 
    opacity: 1; 
  }
}

/* ===== ریسپانسیو ===== */
@media (max-width: 480px) {
  .container {
    padding: 30px 20px;
    border-radius: 20px;
  }
  
  .logo { font-size: 70px; }
  .logo-glow { width: 120px; height: 120px; }
  .brand { font-size: 2rem; }
  h1 { font-size: 1.3rem; }
  p { font-size: 0.9rem; }
  .countdown-circle { width: 60px; height: 60px; }
  .timer-number { font-size: 1.6rem; }
}

@media (max-width: 360px) {
  .logo { font-size: 60px; }
  .brand { font-size: 1.8rem; }
}
</style>
</head>

<body>

<!-- ===== پس‌زمینه‌های متحرک ===== -->
<div class="hearts-bg" id="heartsContainer"></div>

<div class="particles" id="particlesContainer"></div>

<div class="bubble"></div>
<div class="bubble"></div>
<div class="bubble"></div>
<div class="bubble"></div>

<!-- ===== محتوای اصلی ===== -->
<div class="container">
  <!-- لوگو -->
  <div class="logo-wrapper">
    <div class="logo-glow"></div>    <div class="logo">💜</div>
  </div>
  
  <!-- برند -->
  <div class="brand">ShadowGram</div>
  
  <h1>خوش آمدید 👋</h1>
  
  <div class="status-text">
    <span class="status-dot"></span>
    <div class="loading-dots">
      <span></span>
      <span></span>
      <span></span>
    </div>
    <span>در حال انتقال امن به سرور...</span>
  </div>
  
  <!-- Progress Bar -->
  <div class="progress-container">
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
  </div>
  
  <!-- شمارش معکوس -->
  <div class="countdown-wrapper">
    <div class="countdown-circle">
      <svg viewBox="0 0 66 66">
        <defs>
          <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#ff6b9d" />
            <stop offset="100%" stop-color="#c44569" />
          </linearGradient>
        </defs>
        <circle class="bg-circle" cx="33" cy="33" r="32" />
        <circle class="progress-circle" id="progressCircle" cx="33" cy="33" r="32" />
      </svg>
      <span class="timer-number" id="timer">5</span>
    </div>
    <span class="countdown-label">ثانیه تا ورود</span>
  </div>
  
  <!-- دکمه‌ها -->
  <div class="buttons">
    <button class="btn-primary" onclick="goNow()">
      🚀 ورود فوری (بدون انتظار)
    </button>
    <button class="btn-secondary" onclick="cancel()">
      ❌ انصراف    </button>
  </div>
  
  <!-- فوتر -->
  <div class="footer">
    Developed by <strong>Abolfazl Tavallaei</strong> 💜
  </div>
</div>

<script>
// ===== متغیرهای اصلی =====
const TARGET_URL = "https://script.google.com/macros/s/AKfycbyuNpt4lW4_TL1DDCxMoZcUPHm3WdMobFFnSVx35R4xFl8ontaV89kGOQDF3HddwuqD/exec";
let timeLeft = 5;
const totalTime = 5;
const timerEl = document.getElementById("timer");
const progressFill = document.getElementById("progressFill");
const progressCircle = document.getElementById("progressCircle");
const circumference = 2 * Math.PI * 32;
let countdownInterval;

// ===== ساخت قلب‌های متحرک =====
function createHearts() {
  const container = document.getElementById('heartsContainer');
  const hearts = ['💕', '💖', '💗', '💓', '💘', '💝', '❤️', '💜', '💙', '💚'];
  
  for (let i = 0; i < 15; i++) {
    const heart = document.createElement('div');
    heart.className = 'heart';
    heart.textContent = hearts[Math.floor(Math.random() * hearts.length)];
    heart.style.left = Math.random() * 100 + '%';
    heart.style.animationDuration = (8 + Math.random() * 8) + 's';
    heart.style.animationDelay = Math.random() * 5 + 's';
    heart.style.fontSize = (16 + Math.random() * 24) + 'px';
    container.appendChild(heart);
  }
}

// ===== ساخت ذرات نورانی =====
function createParticles() {
  const container = document.getElementById('particlesContainer');
  
  for (let i = 0; i < 25; i++) {
    const particle = document.createElement('div');
    particle.className = 'particle';
    particle.style.left = Math.random() * 100 + '%';
    particle.style.animationDelay = Math.random() * 10 + 's';
    particle.style.animationDuration = (10 + Math.random() * 10) + 's';
    const size = 2 + Math.random() * 4;
    particle.style.width = size + 'px';
    particle.style.height = size + 'px';    container.appendChild(particle);
  }
}

// ===== آپدیت شمارش معکوس =====
function updateCountdown() {
  timerEl.textContent = timeLeft;
  
  const progress = ((totalTime - timeLeft) / totalTime) * 100;
  progressFill.style.width = progress + '%';
  
  const offset = circumference - ((totalTime - timeLeft) / totalTime) * circumference;
  progressCircle.style.strokeDashoffset = offset;
  
  timerEl.style.transform = 'scale(1.2)';
  setTimeout(() => {
    timerEl.style.transform = 'scale(1)';
  }, 200);
  
  timeLeft--;
  
  if (timeLeft < 0) {
    clearInterval(countdownInterval);
    goNow();
  }
}

// ===== ورود فوری =====
function goNow() {
  clearInterval(countdownInterval);
  
  const container = document.querySelector('.container');
  container.style.animation = 'slideUp 0.5s ease reverse';
  
  setTimeout(() => {
    window.location.href = TARGET_URL;
  }, 400);
}

// ===== انصراف =====
function cancel() {
  clearInterval(countdownInterval);
  
  const meta = document.querySelector('meta[http-equiv="refresh"]');
  if (meta) meta.remove();
  
  const container = document.querySelector('.container');
  container.innerHTML = `
    <div class="logo-wrapper">
      <div class="logo-glow"></div>      <div class="logo">👋</div>
    </div>
    <div class="brand">ShadowGram</div>
    <h1>خداحافظ!</h1>
    <p>انتقال لغو شد.</p>
    <p style="margin-top:20px;font-size:0.9rem;">می‌تونی این صفحه رو ببندی.</p>
    <div class="buttons">
      <button class="btn-primary" onclick="location.reload()">🔄 تلاش مجدد</button>
    </div>
    <div class="footer">
      Developed by <strong>Abolfazl Tavallaei</strong> 💜
    </div>
  `;
}

// ===== راه‌اندازی =====
createHearts();
createParticles();
updateCountdown();
countdownInterval = setInterval(updateCountdown, 1000);

// ===== افکت موس =====
document.addEventListener('mousemove', (e) => {
  const x = e.clientX / window.innerWidth;
  const y = e.clientY / window.innerHeight;
  document.body.style.backgroundPosition = `${x * 100}% ${y * 100}%`;
});

// ===== کلید میانبر =====
document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' || e.key === ' ') {
    e.preventDefault();
    goNow();
  }
  if (e.key === 'Escape') {
    cancel();
  }
});
</script>

</body>
  </html>
